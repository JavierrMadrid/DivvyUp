<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Únete a DivvyUp</title>
  <style>
    *,*::before,*::after{box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;background:linear-gradient(135deg,#f0fdf4,#dcfce7);color:#1a2e1a;text-align:center;padding:24px}
    .card{background:#fff;border-radius:24px;padding:44px 32px;box-shadow:0 8px 32px rgba(0,0,0,.1);max-width:420px;width:100%}
    .logo{font-size:3.5rem;margin-bottom:8px}
    .app-name{font-size:.8rem;color:#2e7d52;font-weight:700;letter-spacing:.12em;text-transform:uppercase;margin-bottom:20px}
    h1{color:#1a2e1a;font-size:1.35rem;font-weight:700;margin:0 0 8px;line-height:1.3}
    .gn{color:#2e7d52}
    .subtitle{color:#6b7280;font-size:.95rem;margin:0 0 32px;line-height:1.5}
    .btn{display:inline-block;background:#2e7d52;color:#fff;text-decoration:none;font-weight:700;font-size:1.05rem;padding:16px 40px;border-radius:999px;box-shadow:0 4px 14px rgba(46,125,82,.35)}
    .hint{color:#9ca3af;font-size:.82rem;margin-top:20px;line-height:1.5}
    hr{border:none;border-top:1px solid #e5e7eb;margin:28px 0}
    #err{color:#dc2626;display:none;margin-top:16px}
  </style>
</head>
<body>
<div class="card">
  <div class="logo">💸</div>
  <div class="app-name">DivvyUp</div>
  <h1>Te invitan a unirte a<br><span class="gn" id="gn">un grupo</span></h1>
  <p class="subtitle">Divide gastos fácilmente con tu grupo.</p>
  <hr>
  <a class="btn" id="btn" href="#">Abrir en DivvyUp</a>
  <p class="hint">Si la app no se abre, asegúrate de tener <strong>DivvyUp</strong> instalado.</p>
  <p id="err">Enlace inválido o expirado.</p>
</div>
<script>
  var p=new URLSearchParams(location.search),token=p.get("token"),group=p.get("group")||"un grupo";
  document.getElementById("gn").textContent=group;
  document.title="Únete a "+group+" — DivvyUp";
  if(!token){document.getElementById("btn").style.display="none";document.getElementById("err").style.display="block";}
  else{var dl="divvyup://join?token="+encodeURIComponent(token);document.getElementById("btn").href=dl;location.href=dl;}
</script>
</body>
</html>
